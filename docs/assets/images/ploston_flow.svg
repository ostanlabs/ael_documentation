<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="context-stroke"/>
    </marker>
    <style><![CDATA[
      .node-box      { fill:#fff; stroke:#e2e8f0; stroke-width:1.5 }
      .node-label    { font-size:15px; font-weight:600; fill:#1e293b; text-anchor:middle }
      .node-icon     { font-size:22px; text-anchor:middle }
      .node-sublabel { font-size:10px; fill:#94a3b8; text-anchor:middle; font-weight:500; letter-spacing:.5px }
      .edge-base { stroke:#e2e8f0; stroke-width:2; fill:none; filter:none }
      .edge-hi   { stroke:#e2e8f0; stroke-width:2; fill:none; filter:none }
      .edge-label { font-size:11px; fill:#94a3b8; font-weight:500; opacity:0 }
      .step-badge { opacity:0 }
      .step-num   { font-size:9px; fill:#fff; font-weight:700; text-anchor:middle }
      .label-1{animation:lp1  30s infinite} .badge-1{animation:bp1  30s infinite}
      .label-2{animation:lp2  30s infinite} .badge-2{animation:bp2  30s infinite}
      .label-3{animation:lp3  30s infinite} .badge-3{animation:bp3  30s infinite}
      .label-4{animation:lp4  30s infinite} .badge-4{animation:bp4  30s infinite}
      .label-5{animation:lp5  30s infinite} .badge-5{animation:bp5  30s infinite}
      .label-6{animation:lp6  30s infinite} .badge-6{animation:bp6  30s infinite}
      .label-7{animation:lp7  30s infinite} .badge-7{animation:bp7  30s infinite}
      .label-8{animation:lp8  30s infinite} .badge-8{animation:bp8  30s infinite}
      .label-9{animation:lp9  30s infinite} .badge-9{animation:bp9  30s infinite}
      .label-10{animation:lp10 30s infinite} .badge-10{animation:bp10 30s infinite}
      .label-11{animation:lp11 30s infinite} .badge-11{animation:bp11 30s infinite}
      .hi-user-agent    { animation: hi_user_agent    30s infinite }
      .hi-agent-user    { animation: hi_agent_user    30s infinite }
      .hi-agent-llm     { animation: hi_agent_llm     30s infinite }
      .hi-llm-agent     { animation: hi_llm_agent     30s infinite }
      .hi-agent-ploston { animation: hi_agent_ploston 30s infinite }
      .hi-ploston-agent { animation: hi_ploston_agent 30s infinite }
      .hi-ploston-tools { animation: hi_ploston_tools 30s infinite }
      .hi-tools-ploston { animation: hi_tools_ploston 30s infinite }
      .wf-bubble { animation: wf_show 30s infinite }
      .loop-spin { animation: spin7  30s infinite; transform-box:fill-box; transform-origin:50% 50% }
      @keyframes hi_user_agent {0%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}9%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}10%,100%{stroke:#e2e8f0;stroke-width:2;filter:none}}
      @keyframes hi_agent_user {0%,82%{stroke:#e2e8f0;stroke-width:2;filter:none}83%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}99%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}100%{stroke:#e2e8f0;stroke-width:2;filter:none}}
      @keyframes hi_agent_llm {0%,9%{stroke:#e2e8f0;stroke-width:2;filter:none}10%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}14%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}15%,72%{stroke:#e2e8f0;stroke-width:2;filter:none}73%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}77%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}78%,100%{stroke:#e2e8f0;stroke-width:2;filter:none}}
      @keyframes hi_llm_agent {0%,14%{stroke:#e2e8f0;stroke-width:2;filter:none}15%{stroke:#f59e0b;stroke-width:3;filter:url(#glow)}19%{stroke:#f59e0b;stroke-width:3;filter:url(#glow)}20%,77%{stroke:#e2e8f0;stroke-width:2;filter:none}78%{stroke:#f59e0b;stroke-width:3;filter:url(#glow)}82%{stroke:#f59e0b;stroke-width:3;filter:url(#glow)}83%,100%{stroke:#e2e8f0;stroke-width:2;filter:none}}
      @keyframes hi_agent_ploston {0%,19%{stroke:#e2e8f0;stroke-width:2;filter:none}20%{stroke:#f59e0b;stroke-width:3;filter:url(#glow)}24%{stroke:#f59e0b;stroke-width:3;filter:url(#glow)}25%,100%{stroke:#e2e8f0;stroke-width:2;filter:none}}
      @keyframes hi_ploston_tools {0%,24%{stroke:#e2e8f0;stroke-width:2;filter:none}25%{stroke:#10b981;stroke-width:3;filter:url(#glow)}29%{stroke:#10b981;stroke-width:3;filter:url(#glow)}30%,34%{stroke:#e2e8f0;stroke-width:2;filter:none}35%{stroke:#10b981;stroke-width:3;filter:url(#glow)}42%{stroke:#10b981;stroke-width:3;filter:url(#glow)}43%,51%{stroke:#e2e8f0;stroke-width:2;filter:none}52%{stroke:#10b981;stroke-width:3;filter:url(#glow)}59%{stroke:#10b981;stroke-width:3;filter:url(#glow)}60%,100%{stroke:#e2e8f0;stroke-width:2;filter:none}}
      @keyframes hi_tools_ploston {0%,29%{stroke:#e2e8f0;stroke-width:2;filter:none}30%{stroke:#10b981;stroke-width:3;filter:url(#glow)}34%{stroke:#10b981;stroke-width:3;filter:url(#glow)}35%,42%{stroke:#e2e8f0;stroke-width:2;filter:none}43%{stroke:#10b981;stroke-width:3;filter:url(#glow)}51%{stroke:#10b981;stroke-width:3;filter:url(#glow)}52%,59%{stroke:#e2e8f0;stroke-width:2;filter:none}60%{stroke:#10b981;stroke-width:3;filter:url(#glow)}67%{stroke:#10b981;stroke-width:3;filter:url(#glow)}68%,100%{stroke:#e2e8f0;stroke-width:2;filter:none}}
      @keyframes hi_ploston_agent {0%,67%{stroke:#e2e8f0;stroke-width:2;filter:none}68%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}72%{stroke:#6366f1;stroke-width:3;filter:url(#glow)}73%,100%{stroke:#e2e8f0;stroke-width:2;filter:none}}
      @keyframes lp1  {0%{opacity:1;fill:#6366f1}9%{opacity:1;fill:#6366f1}10%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp2  {0%,9%{opacity:0;fill:#94a3b8}10%{opacity:1;fill:#6366f1}14%{opacity:1;fill:#6366f1}15%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp3  {0%,14%{opacity:0;fill:#94a3b8}15%{opacity:1;fill:#f59e0b}19%{opacity:1;fill:#f59e0b}20%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp4  {0%,19%{opacity:0;fill:#94a3b8}20%{opacity:1;fill:#f59e0b}24%{opacity:1;fill:#f59e0b}25%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp5  {0%,24%{opacity:0;fill:#94a3b8}25%{opacity:1;fill:#10b981}29%{opacity:1;fill:#10b981}30%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp6  {0%,29%{opacity:0;fill:#94a3b8}30%{opacity:1;fill:#10b981}34%{opacity:1;fill:#10b981}35%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp7  {0%,34%{opacity:0;fill:#94a3b8}35%{opacity:1;fill:#10b981}67%{opacity:1;fill:#10b981}68%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp8  {0%,67%{opacity:0;fill:#94a3b8}68%{opacity:1;fill:#6366f1}72%{opacity:1;fill:#6366f1}73%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp9  {0%,72%{opacity:0;fill:#94a3b8}73%{opacity:1;fill:#6366f1}77%{opacity:1;fill:#6366f1}78%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp10 {0%,77%{opacity:0;fill:#94a3b8}78%{opacity:1;fill:#f59e0b}82%{opacity:1;fill:#f59e0b}83%,100%{opacity:0;fill:#94a3b8}}
      @keyframes lp11 {0%,82%{opacity:0;fill:#94a3b8}83%{opacity:1;fill:#6366f1}99%{opacity:1;fill:#6366f1}100%{opacity:0;fill:#94a3b8}}
      @keyframes bp1  {0%{opacity:1}9%{opacity:1}10%,100%{opacity:0}}
      @keyframes bp2  {0%,9%{opacity:0}10%{opacity:1}14%{opacity:1}15%,100%{opacity:0}}
      @keyframes bp3  {0%,14%{opacity:0}15%{opacity:1}19%{opacity:1}20%,100%{opacity:0}}
      @keyframes bp4  {0%,19%{opacity:0}20%{opacity:1}24%{opacity:1}25%,100%{opacity:0}}
      @keyframes bp5  {0%,24%{opacity:0}25%{opacity:1}29%{opacity:1}30%,100%{opacity:0}}
      @keyframes bp6  {0%,29%{opacity:0}30%{opacity:1}34%{opacity:1}35%,100%{opacity:0}}
      @keyframes bp7  {0%,34%{opacity:0}35%{opacity:1}67%{opacity:1}68%,100%{opacity:0}}
      @keyframes bp8  {0%,67%{opacity:0}68%{opacity:1}72%{opacity:1}73%,100%{opacity:0}}
      @keyframes bp9  {0%,72%{opacity:0}73%{opacity:1}77%{opacity:1}78%,100%{opacity:0}}
      @keyframes bp10 {0%,77%{opacity:0}78%{opacity:1}82%{opacity:1}83%,100%{opacity:0}}
      @keyframes bp11 {0%,82%{opacity:0}83%{opacity:1}99%{opacity:1}100%{opacity:0}}
      @keyframes wf_show {0%,14%{opacity:0}15%{opacity:1}67%{opacity:1}68%,100%{opacity:0}}
      @keyframes spin7 {0%,34%{opacity:0;transform:rotate(0deg)}35%{opacity:1;transform:rotate(0deg)}67%{opacity:1;transform:rotate(2160deg)}68%,100%{opacity:0;transform:rotate(0deg)}}
    ]]></style>
  </defs>
  <rect width="1180" height="640" fill="#f8fafc"/>
  <text x="590" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Ploston Workflow: Discovery + Reminders</text>
  <text x="590" y="56" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="500">Example: extract BBC Christmas links and create a reminder for each</text>
  <!-- BASE EDGES -->
  <line x1="245" y1="282" x2="395" y2="282" class="edge-base" marker-end="url(#arrow)"/>
  <line x1="395" y1="308" x2="245" y2="308" class="edge-base" marker-end="url(#arrow)"/>
  <line x1="550" y1="268" x2="655" y2="182" class="edge-base" marker-end="url(#arrow)"/>
  <line x1="655" y1="192" x2="550" y2="278" class="edge-base" marker-end="url(#arrow)"/>
  <line x1="550" y1="318" x2="655" y2="432" class="edge-base" marker-end="url(#arrow)"/>
  <line x1="655" y1="448" x2="550" y2="332" class="edge-base" marker-end="url(#arrow)"/>
  <line x1="785" y1="437" x2="1000" y2="437" class="edge-base" marker-end="url(#arrow)"/>
  <line x1="1000" y1="453" x2="785" y2="453" class="edge-base" marker-end="url(#arrow)"/>
  <!-- OVERLAY EDGES -->
  <line x1="245" y1="282" x2="395" y2="282" class="edge-hi hi-user-agent"    marker-end="url(#arrow)"/>
  <line x1="395" y1="308" x2="245" y2="308" class="edge-hi hi-agent-user"    marker-end="url(#arrow)"/>
  <line x1="550" y1="268" x2="655" y2="182" class="edge-hi hi-agent-llm"     marker-end="url(#arrow)"/>
  <line x1="655" y1="192" x2="550" y2="278" class="edge-hi hi-llm-agent"     marker-end="url(#arrow)"/>
  <line x1="550" y1="318" x2="655" y2="432" class="edge-hi hi-agent-ploston" marker-end="url(#arrow)"/>
  <line x1="655" y1="448" x2="550" y2="332" class="edge-hi hi-ploston-agent" marker-end="url(#arrow)"/>
  <line x1="785" y1="437" x2="1000" y2="437" class="edge-hi hi-ploston-tools" marker-end="url(#arrow)"/>
  <line x1="1000" y1="453" x2="785" y2="453" class="edge-hi hi-tools-ploston" marker-end="url(#arrow)"/>
  <!-- WORKFLOW BUBBLE -->
  <g class="wf-bubble" transform="translate(40, 494)" filter="url(#shadow)">
    <rect width="320" height="72" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <rect width="4" height="72" rx="2" fill="#10b981"/>
    <text x="14" y="16" font-size="10" font-weight="700" fill="#059669" letter-spacing="0.4">WORKFLOW  w_bbc-link-reminders</text>
    <line x1="14" y1="22" x2="306" y2="22" stroke="#bbf7d0" stroke-width="1"/>
    <text x="14" y="37" font-size="11" fill="#1e293b">search for links at <tspan fill="#6366f1" font-weight="600">{source}</tspan></text>
    <text x="14" y="52" font-size="11" fill="#1e293b">filter by <tspan fill="#6366f1" font-weight="600">{keyword}</tspan></text>
    <text x="14" y="67" font-size="11" fill="#1e293b">create reminder for each result</text>
  </g>
  <!-- STEP LABELS -->
  <g transform="translate(230, 232)">
    <g class="step-badge badge-1"><circle cx="8" cy="18" r="8" fill="#6366f1"/><text x="8" y="21" class="step-num">1</text></g>
    <text class="edge-label label-1" text-anchor="start"><tspan x="22" y="4">Extract links from bbc.com</tspan><tspan x="22" dy="14">related to Christmas</tspan><tspan x="22" dy="14">create a reminder for each</tspan></text>
  </g>
  <g transform="translate(460, 168)">
    <g class="step-badge badge-2"><circle cx="8" cy="18" r="8" fill="#6366f1"/><text x="8" y="21" class="step-num">2</text></g>
    <text class="edge-label label-2" text-anchor="start"><tspan x="22" y="4">prompt passed to LLM</tspan><tspan x="22" dy="14">with available tools</tspan><tspan x="22" dy="14">and registered workflows</tspan></text>
  </g>
  <g transform="translate(620, 238)">
    <g class="step-badge badge-3"><circle cx="8" cy="18" r="8" fill="#f59e0b"/><text x="8" y="21" class="step-num">3</text></g>
    <text class="edge-label label-3" text-anchor="start"><tspan x="22" y="4">LLM issues workflow call</tspan><tspan x="22" dy="14">w_bbc-link-reminders</tspan><tspan x="22" dy="14">single deterministic invocation</tspan></text>
  </g>
  <g transform="translate(400, 370)">
    <g class="step-badge badge-4"><circle cx="8" cy="18" r="8" fill="#f59e0b"/><text x="8" y="21" class="step-num">4</text></g>
    <text class="edge-label label-4" text-anchor="start"><tspan x="22" y="4">agent calls Ploston workflow</tspan><tspan x="22" dy="14">w_bbc-link-reminders</tspan><tspan x="22" dy="14">inputs: url, keyword</tspan></text>
  </g>
  <g transform="translate(800, 393)">
    <g class="step-badge badge-5"><circle cx="8" cy="18" r="8" fill="#10b981"/><text x="8" y="21" class="step-num">5</text></g>
    <text class="edge-label label-5" text-anchor="start"><tspan x="22" y="4">Ploston calls firecrawl_map</tspan><tspan x="22" dy="14">to fetch all links on bbc.com</tspan><tspan x="22" dy="14">matching Christmas keyword</tspan></text>
  </g>
  <g transform="translate(800, 470)">
    <g class="step-badge badge-6"><circle cx="8" cy="18" r="8" fill="#10b981"/><text x="8" y="21" class="step-num">6</text></g>
    <text class="edge-label label-6" text-anchor="start"><tspan x="22" y="4">firecrawl returns ~300 links</tspan><tspan x="22" dy="14">all links preserved in full</tspan><tspan x="22" dy="14">no context window truncation</tspan></text>
  </g>
  <g transform="translate(805, 393)">
    <g class="step-badge badge-7"><circle cx="8" cy="18" r="8" fill="#10b981"/><text x="8" y="21" class="step-num">7</text></g>
    <text class="edge-label label-7" text-anchor="start"><tspan x="22" y="4">Ploston loops all 300 links</tspan><tspan x="22" dy="14">creates a reminder for each</tspan><tspan x="22" dy="14">deterministic, zero LLM tokens</tspan></text>
    <g class="loop-spin" transform="translate(212, 18)">
      <circle cx="0" cy="0" r="11" fill="#f0fdf4" stroke="#d1fae5" stroke-width="1"/>
      <path d="M 7 -4 A 8 8 0 1 1 -4 -7" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M -4 -7 l 4 1 l -3 3 z" fill="#10b981"/>
    </g>
  </g>
  <g transform="translate(430, 382)">
    <g class="step-badge badge-8"><circle cx="8" cy="18" r="8" fill="#6366f1"/><text x="8" y="21" class="step-num">8</text></g>
    <text class="edge-label label-8" text-anchor="start"><tspan x="22" y="4">workflow complete</tspan><tspan x="22" dy="14">300 links found</tspan><tspan x="22" dy="14">300 reminders created</tspan></text>
  </g>
  <g transform="translate(460, 168)">
    <g class="step-badge badge-9"><circle cx="8" cy="18" r="8" fill="#6366f1"/><text x="8" y="21" class="step-num">9</text></g>
    <text class="edge-label label-9" text-anchor="start"><tspan x="22" y="4">passes workflow results</tspan><tspan x="22" dy="14">300 links found</tspan><tspan x="22" dy="14">300 reminders created</tspan></text>
  </g>
  <g transform="translate(620, 238)">
    <g class="step-badge badge-10"><circle cx="8" cy="18" r="8" fill="#f59e0b"/><text x="8" y="21" class="step-num">10</text></g>
    <text class="edge-label label-10" text-anchor="start"><tspan x="22" y="4">LLM confirms task complete</tspan><tspan x="22" dy="14">no further actions needed</tspan><tspan x="22" dy="14">token savings: ~94%</tspan></text>
  </g>
  <g transform="translate(240, 322)">
    <g class="step-badge badge-11"><circle cx="8" cy="18" r="8" fill="#6366f1"/><text x="8" y="21" class="step-num">11</text></g>
    <text class="edge-label label-11" text-anchor="start"><tspan x="22" y="4">300 links found on bbc.com</tspan><tspan x="22" dy="14">300 reminders created</tspan><tspan x="22" dy="14">task complete</tspan></text>
  </g>
  <!-- NODES -->
  <g filter="url(#shadow)">
    <rect x="130" y="260" width="115" height="70" class="node-box" rx="12"/>
    <text x="187" y="287" class="node-icon">&#x1F464;</text>
    <text x="187" y="309" class="node-label">User</text>
    <text x="187" y="322" class="node-sublabel">REQUEST</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="395" y="256" width="155" height="88" class="node-box" rx="14" style="stroke:#6366f1;stroke-width:2"/>
    <text x="472" y="285" class="node-icon">&#x1F916;</text>
    <text x="472" y="309" class="node-label">Agent</text>
    <text x="472" y="325" class="node-sublabel" style="fill:#6366f1">ORCHESTRATOR</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="655" y="130" width="130" height="70" class="node-box" rx="12"/>
    <text x="720" y="157" class="node-icon">&#x1F9E0;</text>
    <text x="720" y="180" class="node-label">LLM</text>
    <text x="720" y="193" class="node-sublabel">PLANNING</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="655" y="420" width="130" height="70" class="node-box" rx="12" style="stroke:#10b981;stroke-width:2"/>
    <text x="720" y="447" class="node-icon">&#x2699;&#xFE0F;</text>
    <text x="720" y="469" class="node-label">Ploston</text>
    <text x="720" y="482" class="node-sublabel" style="fill:#10b981;font-size:9px">EXECUTION LAYER</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1000" y="420" width="130" height="70" class="node-box" rx="12"/>
    <text x="1065" y="447" class="node-icon">&#x1F527;</text>
    <text x="1065" y="469" class="node-label">Tools</text>
    <text x="1065" y="482" class="node-sublabel">MCP SERVERS</text>
  </g>
  <!-- LEGEND -->
  <g transform="translate(40, 575)">
    <text x="0" y="0" font-size="10" fill="#94a3b8" font-weight="600" letter-spacing="1">SEQUENCE</text>
    <g transform="translate(0,18)">
      <circle cx="8"   cy="0" r="8" fill="#6366f1"/><text x="8"   y="3" class="step-num">1</text>  <text x="22"  y="4" font-size="10" fill="#64748b">Request</text>
      <circle cx="97"  cy="0" r="8" fill="#6366f1"/><text x="97"  y="3" class="step-num">2</text>  <text x="111" y="4" font-size="10" fill="#64748b">Prompt</text>
      <circle cx="176" cy="0" r="8" fill="#f59e0b"/><text x="176" y="3" class="step-num">3</text>  <text x="190" y="4" font-size="10" fill="#64748b">Wf call</text>
      <circle cx="254" cy="0" r="8" fill="#f59e0b"/><text x="254" y="3" class="step-num">4</text>  <text x="268" y="4" font-size="10" fill="#64748b">To Ploston</text>
      <circle cx="348" cy="0" r="8" fill="#10b981"/><text x="348" y="3" class="step-num">5</text>  <text x="362" y="4" font-size="10" fill="#64748b">Fetch</text>
      <circle cx="410" cy="0" r="8" fill="#10b981"/><text x="410" y="3" class="step-num">6</text>  <text x="424" y="4" font-size="10" fill="#64748b">300 links</text>
